name: olsrr-revdepcheck

on:
  push:
    branches:
      - develop
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  revdepcheck:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true # Vital for fast binary installs on Linux

      - name: Setup R Dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          # We remove the 'extra-packages' line here to avoid the pak error

      - name: Install revdepcheck manually
        run: |
          install.packages(c("remotes", "RSQLite", "rcmdcheck"))
          remotes::install_github("r-lib/revdepcheck")
          install.packages("rcmdcheck")
        shell: Rscript {0}

      - name: Run revdepcheck
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))

          # 1. Clean out any corrupted directory
          if (dir.exists("revdep")) unlink("revdep", recursive = TRUE)

          # 2. Re-create the structure
          dir.create("revdep")

          # 3. Use the explicit init and add sequence
          # This ensures the SQLite 'todo' table is created before check() runs
          revdepcheck::revdep_add(packages = c("xplorerr", "NumericEnsembles", "AFR", "pprof", "SQI", "HanStat"))

          # 4. Check the status to verify 'todo' table exists
          print(revdepcheck::revdep_todo())

          # 5. Execute
          revdepcheck::revdep_check(num_workers = 2)
        shell: Rscript {0}

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: olsrr-revdep-results
          path: revdep/
